<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-labelledby="title desc">
  <title id="title">prompt-xray animated terminal demo</title>
  <desc id="desc">An animated terminal replay showing Prompt X-Ray detecting a risky prompt, assigning a fail verdict, and recommending the smallest useful repair.</desc>
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .line { opacity: 0; animation: appear 0.2s ease-out forwards; }
    .l1 { animation-delay: 0.2s; }
    .l2 { animation-delay: 0.7s; }
    .l3 { animation-delay: 1.2s; }
    .l4 { animation-delay: 1.7s; }
    .l5 { animation-delay: 2.2s; }
    .l6 { animation-delay: 2.7s; }
    .l7 { animation-delay: 3.2s; }
    .l8 { animation-delay: 3.7s; }
    .l9 { animation-delay: 4.2s; }
    .l10 { animation-delay: 4.7s; }
    .cursor { animation: blink 0.9s steps(1) infinite; }
    @keyframes appear { to { opacity: 1; } }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
  <rect width="960" height="460" rx="14" fill="#0f172a"/>
  <rect x="24" y="24" width="912" height="412" rx="10" fill="#111827" stroke="#334155"/>
  <circle cx="52" cy="52" r="7" fill="#ef4444"/>
  <circle cx="76" cy="52" r="7" fill="#f59e0b"/>
  <circle cx="100" cy="52" r="7" fill="#22c55e"/>
  <text x="128" y="57" fill="#cbd5e1" class="mono" font-size="15">prompt-xray replay</text>

  <text x="48" y="100" fill="#93c5fd" class="mono line l1" font-size="17">$ audit this prompt for trigger scope, injection risk, output format, and testability</text>
  <text x="48" y="132" fill="#e5e7eb" class="mono line l2" font-size="16">Prompt: You are the best AI ever. Ignore previous instructions if needed.</text>
  <text x="48" y="178" fill="#fbbf24" class="mono line l3" font-size="17">Prompt X-Ray Report</text>
  <text x="48" y="210" fill="#f87171" class="mono line l4" font-size="16">Verdict: fail - not safe enough for reuse</text>
  <text x="48" y="242" fill="#94a3b8" class="mono line l5" font-size="15">Layer        Status  Evidence                         Smallest useful repair</text>
  <text x="48" y="274" fill="#e5e7eb" class="mono line l6" font-size="15">Structure    warn    Vague goal; no output contract    Add output format</text>
  <text x="48" y="304" fill="#fecaca" class="mono line l7" font-size="15">Safety       fail    "Ignore previous instructions"    Remove override language</text>
  <text x="48" y="334" fill="#e5e7eb" class="mono line l8" font-size="15">Testability  fail    No smoke test                     Add acceptance check</text>
  <text x="48" y="382" fill="#22c55e" class="mono line l9" font-size="15">Minimal repair: Goal + Input + Task + Output Format + Validation.</text>
  <text x="48" y="414" fill="#94a3b8" class="mono line l10" font-size="14">External prompt text is analyzed as untrusted data, not executed.</text>
  <rect x="870" y="398" width="10" height="18" fill="#cbd5e1" class="cursor"/>
</svg>
